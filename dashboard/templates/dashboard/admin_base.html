<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}Admin Panel{% endblock %}</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --sidebar: #0f172a;
        --bg: #f1f5f9;
        --white: #ffffff;
        --accent: #d4af37;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        background: var(--bg);
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 260px;
        background: var(--sidebar);
        color: white;
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        padding: 30px 20px;
      }

      .logo {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 40px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .nav-item {
        color: #cbd5e1;
        text-decoration: none;
        padding: 14px 16px;
        border-radius: 14px;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--accent);
      }

      .logout {
        margin-top: 40px;
        color: #ef4444;
      }

      .main-content {
        margin-left: 260px;
        width: 100%;
        padding: 40px;
      }

      .page-title {
        margin-bottom: 30px;
      }

      .page-title h1 {
        font-size: 2rem;
        color: var(--text);
      }

      .content-card {
        background: var(--white);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 16px;
        background: #f8fafc;
        color: var(--muted);
        font-size: 0.85rem;
        text-transform: uppercase;
      }

      td {
        padding: 18px 16px;
        border-top: 1px solid var(--border);
      }

      .status {
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
      }

      .published {
        background: #dcfce7;
        color: #166534;
      }

      .draft {
        background: #fef3c7;
        color: #854d0e;
      }

      .action-btn {
        text-decoration: none;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .view-btn {
        background: #eff6ff;
        color: #2563eb;
      }

      .edit-btn {
        background: #f8fafc;
        color: #0f172a;
      }

      .delete-btn {
        background: #fef2f2;
        color: #dc2626;
      }
    </style>
  </head>

  <body>
    <aside class="sidebar">
      <div class="logo">
        <i class="fas fa-microchip"></i>
        EventFiY
      </div>

      <nav class="nav-links">
        <a href="{% url 'admin_dashboard' %}" class="nav-item">
          <i class="fas fa-chart-pie"></i>
          Overview
        </a>

        <a href="{% url 'admin_events' %}" class="nav-item">
          <i class="fas fa-calendar-alt"></i>
          Events
        </a>

        <a href="{% url 'admin_tickets' %}" class="nav-item">
          <i class="fas fa-ticket-alt"></i>
          Tickets
        </a>

        <a href="{% url 'admin_users' %}" class="nav-item">
          <i class="fas fa-users"></i>
          Users
        </a>

        <a href="{% url 'admin_analytics' %}" class="nav-item">
          <i class="fas fa-chart-line"></i>
          Analytics
        </a>

        <a href="{% url 'admin_settings' %}" class="nav-item">
          <i class="fas fa-cog"></i>
          Settings
        </a>

        <a href="{% url 'logout' %}" class="nav-item logout">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-title">
        <h1>{% block page_title %} Dashboard {% endblock %}</h1>
      </div>

      <div class="content-card">{% block content %} {% endblock %}</div>
    </main>
  </body>
</html>
