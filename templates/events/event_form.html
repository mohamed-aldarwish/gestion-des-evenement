{% load static %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if event %}Modifier{% else %}Créer{% endif %} Event</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

        <link rel="stylesheet" href="{% static 'css/events/event-form.css' %}">
  </head>

  <body>
    <div class="form-container">
      <div class="form-header">
     <h1>
    {% if event %}
        Edit Event
    {% else %}
        New Event
    {% endif %}
</h1>
        <p>
          Fill in the information below to publish your event.
        </p>
      </div>

      <form method="POST" action="" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">
          <!-- Title -->
          <div class="form-group full-width">
            <label><i class="fas fa-heading"></i> Event Title</label>
            <input
              type="text"
              name="title"
              value="{{ event.title|default:'' }}"
              placeholder="Ex: AI Conference in ......"
              required
            />
          </div>

          <!-- Description -->
          <div class="form-group full-width">
            <label>
              <i class="fas fa-align-left"></i> Detailed Description
            </label>
            <textarea
              name="description"
              placeholder="Describe your event..."
            >
{{ event.description|default:'' }}</textarea
            >
          </div>

          <!-- Date -->
          <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Date</label>
            <input
              type="date"
              name="event_date"
              id="event_date"
              value="{{ event.event_date|date:'Y-m-d' }}"
              required
            />
            <span class="date-warning" id="date-alert">
              The date cannot be in the past!
            </span>
          </div>

          <!-- Time -->
          <div class="form-group">
            <label><i class="fas fa-clock"></i> Time</label>
            <input
              type="time"
              name="event_time"
              value="{{ event.event_time|time:'H:i' }}"
              required
            />
          </div>

          <!-- Location -->
          <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Location</label>
            <input
              type="text"
              name="location"
              value="{{ event.location|default:'' }}"
              placeholder="Ex: 123 Main Street ......"
              required
            />
          </div>

          <!-- Capacity -->
          <div class="form-group">
            <label><i class="fas fa-users"></i> Capacity</label>
            <input
              type="number"
              name="capacity"
              value="{{ event.capacity|default:'' }}"
              min="1"
              placeholder="Ex: 100"
              required
            />
          </div>

        <!-- Price -->
<div class="form-group">
    <label><i class="fas fa-dollar-sign"></i> Price</label>
    <input
        type="number"
        step="0.01"
        min="0"
        name="price"
        value="{% if event.price %}{{ event.price }}{% endif %}"
placeholder="Ex: 49.99"
        required
    />
</div>

<!-- Image -->
<div class="form-group">
    <label><i class="fas fa-image"></i> Event Image</label>
    <input type="file" name="image" accept="image/*">

    {% if event.image %}
        <div class="events-event-form-inline-1">
            <img src="{{ event.image.url }}" class="events-event-form-inline-2">
        </div>
    {% endif %}
</div>

<!-- Category -->
<div class="form-group">
    <label><i class="fas fa-tag"></i> Category</label>
    <select name="category">
        <option value="Music" {% if event.category == "Music" %}selected{% endif %}>Music & Concert</option>
        <option value="Gaming" {% if event.category == "Gaming" %}selected{% endif %}>Gaming & Esports</option>
        <option value="Tech" {% if event.category == "Tech" %}selected{% endif %}>Technology</option>
        <option value="Art" {% if event.category == "Art" %}selected{% endif %}>Art & Culture</option>
        <option value="Sport" {% if event.category == "Sport" %}selected{% endif %}>Sports</option>
        <option value="Education" {% if event.category == "Education" %}selected{% endif %}>Education</option>
    </select>
</div>

<!-- Status -->
<div class="form-group">
    <label><i class="fas fa-info-circle"></i> Status</label>
    <select name="status" required>
        <option value="draft" {% if event.status == "draft" or not event %}selected{% endif %}>Draft</option>
        <option value="published" {% if event.status == "published" %}selected{% endif %}>Publish Directly</option>
    </select>
</div>

        <div class="actions">
          <a href="{% url 'event_list' %}" class="btn-back">Cancel</a>

          <button type="submit">
            <i class="fas fa-save"></i>
            {% if event %}Update Event{% else %}Create Event{% endif %}
          </button>
        </div>
      </form>
    </div>

    <script src="{% static 'js/events/event-form.js' %}"></script>
  </body>
</html>
