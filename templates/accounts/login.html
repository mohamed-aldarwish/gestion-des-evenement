{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Luxe - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- إضافة FontAwesome للأيقونات -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

        <link rel="stylesheet" href="{% static 'css/accounts/login.css' %}">
  </head>
  <body>
    <div class="login-card" id="loginCard">
      <div class="logo-area">
        <i class="fas fa-hotel"></i>
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Please enter your details to access your account</p>

      {% if messages %} {% for message in messages %}
      <div
        class="message-banner {% if 'error' in message.tags %}message-error{% else %}message-success{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %}

      <form method="POST" action="" id="loginForm">
        {% csrf_token %}

        <div class="input-group">
          <label>Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input
              type="text"
              name="username"
              placeholder="Enter username"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              name="password"
              id="passwordField"
              placeholder="••••••••"
              required
            />
            <i class="fas fa-eye toggle-password" id="togglePass"></i>
          </div>
        </div>

        <button type="submit" id="submitBtn">
          <span>Sign In</span>
          <div class="loader" id="btnLoader"></div>
        </button>
      </form>

      <div class="footer-links">
        Don't have an account? <a href="{% url 'register' %}">Create Account</a>
      </div>
    </div>

    <script src="{% static 'js/accounts/login.js' %}"></script>
  </body>
</html>
