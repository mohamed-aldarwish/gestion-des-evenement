{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Grand Luxe | Hotel Reservation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- أيقونات FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

        <link rel="stylesheet" href="{% static 'css/accounts/register.css' %}">
  </head>
  <body>
    <div class="register-card" id="registerCard">
      <div class="header-section">
        <i class="fas fa-paper-plane"></i>
        <h1>Create Account</h1>
        <p class="subtitle">Join our exclusive community today</p>
      </div>

      <!-- Django Messages -->
      {% if messages %} {% for message in messages %}
      <div
        class="message-banner {% if 'error' in message.tags %}message-error{% else %}message-success{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %}

      <form method="POST" action="" id="registerForm">
        {% csrf_token %}

        <div class="form-grid">
          <div class="input-group">
            <label>Username</label>
            <div class="input-wrapper">
              <i class="fas fa-user-tag"></i>
              <input
                type="text"
                name="username"
                placeholder="Username"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <div class="input-wrapper">
              <i class="fas fa-phone"></i>
              <input type="text" name="phone" placeholder="+212..." />
            </div>
          </div>

          <div class="input-group full-width">
            <label>Email Address</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                name="email"
                placeholder="yourname@email.com"
                required
              />
            </div>
          </div>

          <div class="input-group full-width">
            <label>Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                name="password"
                placeholder="Min. 8 characters"
                required
              />
            </div>
          </div>

          <button type="submit" id="regBtn">
            <span>Create My Account</span>
            <div class="loader" id="regLoader"></div>
          </button>
        </div>
      </form>

      <div class="footer-link">
        Already have an account? <a href="{% url 'login' %}">Sign In</a>
      </div>
    </div>

    <script src="{% static 'js/accounts/register.js' %}"></script>
  </body>
</html>
