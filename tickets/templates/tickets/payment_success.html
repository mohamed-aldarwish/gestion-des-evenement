<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:"Plus Jakarta Sans",sans-serif;
            background:#f8fafc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .success-card{
            background:white;
            padding:50px;
            border-radius:30px;
            text-align:center;
            width:90%;
            max-width:520px;
            box-shadow:0 20px 50px rgba(0,0,0,.08);
        }

        .icon{
            width:90px;
            height:90px;
            border-radius:50%;
            background:#dcfce7;
            color:#16a34a;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:3rem;
            margin:0 auto 25px;
        }

        h1{
            color:#0f172a;
            margin-bottom:12px;
        }

        p{
            color:#64748b;
            line-height:1.7;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            background:#0f172a;
            color:white;
            padding:15px 28px;
            border-radius:16px;
            text-decoration:none;
            font-weight:700;
        }

        .btn:hover{
            background:#d4af37;
            color:#0f172a;
        }
    </style>
</head>
<body>

<div class="success-card">

    <div class="icon">
        ✓
    </div>

    <h1>Payment Successful</h1>

    <p>
        Your payment has been successfully processed.
        Your reservation is now confirmed.
    </p>

    <a href="/events/" class="btn">
        Back to Events
    </a>

</div>

</body>
</html>
