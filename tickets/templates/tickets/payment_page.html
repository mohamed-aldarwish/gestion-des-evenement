<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>

    <script src="https://js.stripe.com/v3/"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#0f172a;
            --accent:#d4af37;
            --bg:#f8fafc;
        }

        *{
            box-sizing:border-box;
            font-family:"Plus Jakarta Sans",sans-serif;
        }

        body{
            margin:0;
            background:var(--bg);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .payment-card{
            width:100%;
            max-width:520px;
            background:white;
            border-radius:30px;
            padding:45px;
            box-shadow:0 20px 50px rgba(0,0,0,.08);
        }

        .top{
            text-align:center;
            margin-bottom:35px;
        }

        .top h1{
            margin:0;
            color:var(--primary);
        }

        .top p{
            color:#64748b;
        }

        .event-box{
            background:#f8fafc;
            border-radius:18px;
            padding:20px;
            margin-bottom:25px;
        }

        .event-box h3{
            margin-top:0;
            color:var(--primary);
        }

        .price{
            font-size:2rem;
            font-weight:800;
            color:var(--accent);
            margin-top:10px;
        }

        #card-element{
            border:1.5px solid #e2e8f0;
            border-radius:16px;
            padding:18px;
            margin-bottom:25px;
        }

        .pay-btn{
            width:100%;
            border:none;
            background:var(--primary);
            color:white;
            padding:18px;
            border-radius:18px;
            font-size:1rem;
            font-weight:800;
            cursor:pointer;
            transition:.3s;
        }

        .pay-btn:hover{
            background:var(--accent);
            color:var(--primary);
        }

        #payment-message{
            margin-top:18px;
            text-align:center;
            font-weight:700;
        }
    </style>
</head>
<body>

<div class="payment-card">

    <div class="top">
        <h1>Secure Payment</h1>
        <p>Complete your reservation securely.</p>
    </div>

    <div class="event-box">
        <h3>{{ event.title }}</h3>

        <p>
            {{ event.event_date }}
            •
            {{ event.location }}
        </p>

        <div class="price">
            ${{ event.price }}
        </div>
    </div>

    <form id="payment-form">

        <div id="card-element"></div>

        <button id="submit" class="pay-btn">
            Pay Now
        </button>

        <div id="payment-message"></div>

    </form>

</div>

<script>
const stripe = Stripe('{{ stripe_public_key }}');
const elements = stripe.elements();
const card = elements.create('card');

card.mount('#card-element');

const form = document.getElementById('payment-form');
const submitBtn = document.getElementById('submit');
const messageBox = document.getElementById('payment-message');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.innerText = 'Processing...';
    messageBox.textContent = '';

    try {
        const response = await fetch(
            '{% url "tickets:create_payment_intent" event.id %}',
            {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                },
            }
        );

        const data = await response.json();

        if (!response.ok || data.error) {
            messageBox.textContent = data.error || 'Payment initialization failed.';
            submitBtn.disabled = false;
            submitBtn.innerText = 'Pay Now';
            return;
        }

        const result = await stripe.confirmCardPayment(
            data.clientSecret,
            {
                payment_method: {
                    card: card,
                }
            }
        );

        if (result.error) {
            messageBox.textContent = result.error.message;
            submitBtn.disabled = false;
            submitBtn.innerText = 'Pay Now';
        } else {
            if (result.paymentIntent.status === 'succeeded') {
                window.location.href = '{% url "tickets:payment_success" event.id %}?payment_intent=' + result.paymentIntent.id;
            } else {
                window.location.href = '{% url "tickets:payment_cancel" %}';
            }
        }

    } catch (error) {
        messageBox.textContent = 'An error occurred. Please try again.';
        submitBtn.disabled = false;
        submitBtn.innerText = 'Pay Now';
    }
});
</script>

</body>
</html>
