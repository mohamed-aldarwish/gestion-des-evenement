<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supprimer | {{ event.title }}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --danger: #ef4444;
        --danger-dark: #b91c1c;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
      }

      * {
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        margin: 0;
        background-color: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .delete-container {
        background: var(--card-bg);
        max-width: 480px;
        width: 100%;
        padding: 45px 35px;
        border-radius: 32px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        border: 1px solid #f1f5f9;
        animation: slideUp 0.4s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .warning-icon-animate {
        width: 80px;
        height: 80px;
        background: #fef2f2;
        color: var(--danger);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.2rem;
        margin: 0 auto 25px;
        border: 4px solid #fff1f1;
        animation: pulse-red 2s infinite;
      }

      @keyframes pulse-red {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      h1 {
        font-size: 1.6rem;
        color: var(--text-main);
        margin: 0 0 12px 0;
        font-weight: 800;
      }

      .alert-box {
        background: #fff1f1;
        border-left: 4px solid var(--danger);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 30px;
        text-align: left;
      }

      .alert-box p {
        margin: 0;
        font-size: 0.95rem;
        color: #991b1b;
        line-height: 1.5;
      }

      .event-title-display {
        font-weight: 700;
        color: var(--danger-dark);
        text-decoration: underline;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        padding: 16px;
        border-radius: 16px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .btn-danger {
        background-color: var(--danger);
        color: white;
        box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2);
      }

      .btn-danger:hover {
        background-color: var(--danger-dark);
        transform: translateY(-2px);
      }

      .btn-cancel {
        background-color: #f1f5f9;
        color: var(--text-muted);
      }

      .btn-cancel:hover {
        background-color: #e2e8f0;
        color: var(--text-main);
      }

      .irreversible-tag {
        margin-top: 25px;
        display: inline-block;
        font-size: 0.75rem;
        background: #f1f5f9;
        color: #64748b;
        padding: 5px 12px;
        border-radius: 100px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="delete-container">
      <div class="warning-icon-animate">
        <i class="fas fa-exclamation-triangle"></i>
      </div>

      <h1>Attention !</h1>

      <div class="alert-box">
        <p>
          Vous êtes sur le point de supprimer l'événement
          <span class="event-title-display">"{{ event.title }}"</span>. Toutes
          les données associées seront perdues.
        </p>
      </div>

      <div class="actions">
        <form method="POST" action="" id="deleteForm">
          {% csrf_token %}
          <button
            type="submit"
            class="btn btn-danger"
            id="confirmDeleteBtn"
            style="width: 100%"
          >
            <i class="fas fa-trash-alt"></i> Confirmer la suppression
          </button>
        </form>

        <a href="{% url 'event_detail' event.id %}" class="btn btn-cancel">
          <i class="fas fa-times"></i> Annuler
        </a>
      </div>

      <span class="irreversible-tag">Action irréversible</span>
    </div>

    <script>
      const form = document.getElementById("deleteForm");
      const btn = document.getElementById("confirmDeleteBtn");

      form.addEventListener("submit", (e) => {
        // تأثير اهتزاز أخير قبل الحذف
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Suppression...';
        btn.style.opacity = "0.8";
        btn.style.pointerEvents = "none";
      });
    </script>
  </body>
</html>
