<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Message | Hotel-Res</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --danger: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --bg: #f9f9f9;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .error-container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: #fff5f5;
            color: var(--danger);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin: 0 auto 25px;
        }

        h2 {
            color: var(--text-dark);
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        p {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background: var(--text-dark);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="icon-box">
        <span>⚠️</span>
    </div>
    
    <h2>Something went wrong</h2>
    
    <!-- Dynamic message from Django -->
    <p>{{ message|default:"We encountered an unexpected issue. Please try again or return to the main page." }}</p>

    <a href="{% url 'event_list' %}" class="btn-home">Back to Events</a>
</div>

</body>
</html>
