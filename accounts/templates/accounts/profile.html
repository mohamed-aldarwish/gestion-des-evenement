<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile | Hotel Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- إضافة FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #d4af37;
            --bg: #0f0f0f;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --danger: #d63031;
            --success: #00b894;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #2c2c2c, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .profile-container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .profile-container.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* هيدر الملف الشخصي */
        .profile-header {
            background: var(--primary);
            padding: 50px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* زخرفة خلفية خفيفة */
        .profile-header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            z-index: 2;
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent), #f1c40f);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary);
            border: 5px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .status-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            background: var(--success);
            border: 3px solid var(--primary);
            border-radius: 50%;
        }

        .profile-header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--white);
            color: white;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
        }

        .user-tag {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            color: var(--accent);
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 8px;
            font-weight: 500;
            border: 1px solid var(--accent);
            position: relative;
            z-index: 2;
        }

        /* جسم البطاقة */
        .profile-body {
            padding: 30px 35px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 25px;
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .info-row:last-child { border-bottom: none; }

        .info-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            color: var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .info-content {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* الأزرار */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 14px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            grid-column: span 2; /* زر العودة يأخذ المساحة كاملة */
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212,175,55,0.2);
        }

        .btn-logout {
            background: #fff0f0;
            color: var(--danger);
            border: 1px solid #ffebeb;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: #f0f7ff;
            color: #0984e3;
            border: 1px solid #e1f0ff;
        }

        .btn-edit:hover {
            background: #0984e3;
            color: white;
        }
    </style>
</head>
<body>

<div class="profile-container" id="profileCard">
    <div class="profile-header">
        <div class="avatar-wrapper">
            <div class="avatar-circle">
                {{ request.user.username|slice:":1"|upper }}
            </div>
            <div class="status-badge"></div>
        </div>
        <h1>{{ request.user.username|capfirst }}</h1>
        <span class="user-tag">{{ profile.role|default:"Member" }}</span>
    </div>

    <div class="profile-body">
        <div class="info-card">
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div class="info-content">
                    <span class="label">Email Address</span>
                    <span class="value">{{ request.user.email }}</span>
                </div>
            </div>
            
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div class="info-content">
                    <span class="label">Phone Number</span>
                    <span class="value">{{ profile.phone|default:"Not provided" }}</span>
                </div>
            </div>

            <div class="info-row">
                <div class="info-icon"><i class="fas fa-shield-halved"></i></div>
                <div class="info-content">
                    <span class="label">Account Status</span>
                    <span class="value" style="color: var(--success);">Verified Account</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="{% url 'event_list' %}" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <a href="{% url 'logout' %}" class="btn btn-logout">
                <i class="fas fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const card = document.getElementById('profileCard');
        setTimeout(() => {
            card.classList.add('show');
        }, 100);
    });
</script>

</body>
</html>
